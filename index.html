<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ipc: http://ipc.localhost; font-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
    <title>DevWhisp</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0a0712; color: #f3f0fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; height: 100vh; overflow: hidden; }
      /* Splash overlay — a sibling of #app (not a child) so Svelte's mount
         into #app cannot accidentally leave this visible. main.ts removes
         the splash once the Svelte app is mounted and the first frame is
         rendered. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0a0712;
        color: #a09bb6;
        font-size: 14px;
        letter-spacing: 0.02em;
        z-index: 10;
        transition: opacity 180ms ease-out;
      }
      #app-splash img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        filter: drop-shadow(0 4px 16px rgba(124, 58, 237, 0.45));
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app { height: 100vh; }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <img src="/icon.png" width="56" height="56" alt="" />
      <span>Loading DevWhisp…</span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
