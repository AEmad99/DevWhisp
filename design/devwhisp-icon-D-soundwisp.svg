<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="200" fill="url(#bg)"/>
  <!-- A bold sound wave that tapers into a wisp at the right end -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 260 512
             Q 360 360 460 512
             Q 560 664 660 512"
          stroke-width="96"/>
    <path d="M 720 460
             Q 760 440 800 460
             Q 840 480 880 460"
          stroke-width="40" opacity="0.6"/>
  </g>
  <!-- Source dot at left -->
  <circle cx="220" cy="512" r="40" fill="#ffffff"/>
</svg>
