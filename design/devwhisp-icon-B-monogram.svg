<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="200" fill="url(#bg)"/>
  <!-- Bold "W" monogram with the middle dip rendered as a tiny sound wave -->
  <g fill="none" stroke="#ffffff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 220 340 L 340 720"/>
    <path d="M 340 720 L 440 480"/>
    <path d="M 440 480 L 540 720"/>
    <path d="M 540 720 L 660 340"/>
  </g>
  <!-- Two small sound waves at the upper right (whisper wisp) -->
  <g fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" opacity="0.9">
    <path d="M 720 280 Q 760 250 800 280"/>
    <path d="M 730 360 Q 790 330 820 360"/>
  </g>
</svg>
